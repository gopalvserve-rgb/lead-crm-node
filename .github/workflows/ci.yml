name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Syntax check all JS files
        run: |
          for f in server.js db/*.js utils/*.js routes/*.js public/*.js; do
            node --check "$f" && echo "OK: $f"
          done
